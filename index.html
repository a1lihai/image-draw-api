<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>模库AI | 即梦AI绘图</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }
        .container {
            max-width: 640px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 28px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 24px;
            color: #111827;
        }
        textarea, input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        textarea {
            height: 120px;
            resize: none;
        }
        .size-row {
            display: flex;
            gap: 14px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        #result-box {
            margin-top: 22px;
            white-space: pre-wrap;
            font-size: 14px;
        }
        .success {color: #16a34a;}
        .error {color: #dc2626;}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>模库AI · 即梦文生图</h1>
        <textarea id="prompt" placeholder="正向提示词，描述画面细节"></textarea>
        <textarea id="neg-prompt" placeholder="反向提示词，规避畸形、模糊"></textarea>
        <div class="size-row">
            <input type="number" id="w" value="832" placeholder="宽度">
            <input type="number" id="h" value="1216" placeholder="高度">
        </div>
        <button onclick="submitDraw()">一键生成图片</button>
        <div id="result-box"></div>
    </div>
</div>
<script>
    async function submitDraw() {
        const resBox = document.getElementById("result-box");
        resBox.className = "";
        resBox.innerText = "正在请求接口，请等待...";
        const payload = {
            prompt: document.getElementById("prompt").value.trim(),
            negative_prompt: document.getElementById("neg-prompt").value.trim(),
            width: Number(document.getElementById("w").value),
            height: Number(document.getElementById("h").value),
            num: 1
        };
        try {
            const fetchRes = await fetch("/api/v1/image/generate", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload),
                cache: "no-cache"
            });
            const data = await fetchRes.json();
            if (data.code === 0) {
                resBox.className = "success";
                resBox.innerText = "✅ 生成成功！图片链接：\n" + data.data.image_urls.join("\n");
            } else {
                resBox.className = "error";
                resBox.innerText = "❌ 生成失败：\n" + data.detail;
            }
        } catch (err) {
            resBox.className = "error";
            resBox.innerText = "网络请求异常：" + err.toString();
        }
    }
</script>
</body>
</html>
