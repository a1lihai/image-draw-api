<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智聚AI | 对话绘图一体化工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui;
        }
        body {
            background: #f5f7fa;
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }
        .chat-panel, .draw-panel {
            width: 48%;
            background: #ffffff;
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 12px #0000000f;
        }
        h3 {
            font-size: 18px;
            margin-bottom: 14px;
            color: #222;
        }
        .msg-container {
            flex: 1;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 12px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .msg {
            margin: 8px 0;
            padding: 9px 13px;
            border-radius: 10px;
            max-width: 82%;
            line-height: 1.5;
        }
        .user-msg {
            background: #1677ff;
            color: white;
            margin-left: auto;
        }
        .ai-msg {
            background: #f0f2f5;
            color: #1f1f1f;
            margin-right: auto;
        }
        textarea {
            width: 100%;
            height: 90px;
            padding: 11px;
            border: 1px solid #ddd;
            border-radius: 10px;
            resize: none;
            font-size: 14px;
        }
        .row-input {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .row-input input {
            flex: 1;
            padding: 9px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        button:active {
            background: #0f5fcc;
        }
        .img-show {
            flex: 1;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 12px;
            overflow-y: auto;
            margin-bottom: 12px;
            min-height: 320px;
        }
        .img-show img {
            max-width: 100%;
            border-radius: 8px;
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <div class="chat-panel">
        <h3>AI对话</h3>
        <div class="msg-container" id="chatBox"></div>
        <textarea id="chatInput" placeholder="输入对话内容..."></textarea>
        <button onclick="sendChat()">发送对话</button>
    </div>

    <div class="draw-panel">
        <h3>AI生图｜即梦AI</h3>
        <div class="img-show" id="imgBox"></div>
        <textarea id="promptInput" placeholder="正向提示词，描述画面"></textarea>
        <div class="row-input">
            <input type="number" id="wInput" value="832" placeholder="宽度">
            <input type="number" id="hInput" value="1216" placeholder="高度">
        </div>
        <button onclick="genImage()">一键生成图片</button>
    </div>

    <script>
        const API_BASE = "https://image-draw-api.onrender.com";
        function addChatMsg(type, text) {
            const box = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = type === "user" ? "msg user-msg" : "msg ai-msg";
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
        async function sendChat() {
            const text = document.getElementById("chatInput").value.trim();
            if (!text) return;
            addChatMsg("user", text);
            document.getElementById("chatInput").value = "";
            addChatMsg("ai", "对话接口已部署，填入模型即可使用，绘图功能优先测试");
        }
        async function genImage() {
            const prompt = document.getElementById("promptInput").value.trim();
            const w = parseInt(document.getElementById("wInput").value);
            const h = parseInt(document.getElementById("hInput").value);
            if (!prompt || !w || !h) {
                document.getElementById("imgBox").innerText = "请填写提示词、宽高数值";
                return;
            }
            const imgBox = document.getElementById("imgBox");
            imgBox.innerText = "生成中，请等待，免费Render休眠会慢一点...";
            try {
                const res = await fetch(`${API_BASE}/api/v1/image/generate`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model_type: "jimeng",
                        prompt: prompt,
                        width: w,
                        height: h,
                        num: 1
                    })
                });
                const data = await res.json();
                if (data.code === 200 && data.data.image_urls) {
                    let html = "";
                    data.data.image_urls.forEach(url => {
                        html += `<img src="${url}" alt="生成图">`;
                    });
                    imgBox.innerHTML = html;
                } else {
                    imgBox.innerText = "生成失败：" + JSON.stringify(data);
                }
            } catch (err) {
                imgBox.innerText = "网络异常：" + err.toString();
            }
        }
    </script>
</body>
</html>
