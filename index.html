<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI绘图对话工具</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:system-ui}
        body {background:#f5f7fa; display:flex; height:100vh; gap:20px; padding:20px}
        .chat-box {width:45%; background:#fff; border-radius:12px; padding:16px; display:flex; flex-direction:column}
        .draw-box {width:45%; background:#fff; border-radius:12px; padding:16px; display:flex; flex-direction:column}
        .msg-list {flex:1; overflow:auto; border:1px solid #eee; border-radius:8px; padding:10px; margin-bottom:12px}
        .msg {margin:6px 0; padding:8px 12px; border-radius:8px; max-width:80%}
        .user {background:#0088ff; color:#fff; margin-left:auto}
        .bot {background:#eef2f7; color:#111; margin-right:auto}
        textarea {width:100%; height:80px; padding:10px; border:1px solid #ddd; border-radius:8px; resize:none}
        button {margin-top:8px; padding:10px 20px; background:#0088ff; color:white; border:none; border-radius:8px; cursor:pointer}
        #img-box {flex:1; border:1px solid #eee; border-radius:8px; margin-bottom:12px; padding:10px; overflow:auto}
        img {max-width:100%; border-radius:6px}
    </style>
</head>
<body>
    <!-- 对话窗口 -->
    <div class="chat-box">
        <h3>AI对话</h3>
        <div class="msg-list" id="chatList"></div>
        <textarea id="chatInput" placeholder="输入对话内容..."></textarea>
        <button onclick="sendChat()">发送对话</button>
    </div>

    <!-- 绘图窗口 -->
    <div class="draw-box">
        <h3>AI生图</h3>
        <div id="img-box"></div>
        <textarea id="drawInput" placeholder="输入绘图提示词"></textarea>
        <button onclick="genImage()">一键生成图片</button>
    </div>

    <script>
        const API_HOST = "https://image-draw-api.onrender.com";

        // 对话发送
        async function sendChat() {
            const text = document.getElementById("chatInput").value.trim();
            if(!text) return;
            addMsg("user", text);
            document.getElementById("chatInput").value = "";
            // 这里你后续完善对话接口，先占位
            addMsg("bot", "对话接口待完善");
        }
        function addMsg(type, text) {
            const list = document.getElementById("chatList");
            const div = document.createElement("div");
            div.className = "msg " + type;
            div.innerText = text;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        // 生成图片
        async function genImage() {
            const prompt = document.getElementById("drawInput").value.trim();
            if(!prompt) return;
            const imgBox = document.getElementById("img-box");
            imgBox.innerHTML = "生成中，请稍等...";
            try {
                const res = await fetch(API_HOST + "/api/v1/image/generate", {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({
                        prompt: prompt,
                        width: 832,
                        height: 1216,
                        draw_type: "general_v2"
                    })
                })
                const data = await res.json();
                if(data.data?.image_url) {
                    imgBox.innerHTML = `<img src="${data.data.image_url}" />`;
                } else {
                    imgBox.innerHTML = "生成失败：" + JSON.stringify(data);
                }
            } catch(e) {
                imgBox.innerHTML = "网络错误";
            }
        }
    </script>
</body>
</html>
